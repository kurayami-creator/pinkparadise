<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>🌸 Pink Paradise — Магазин услуг</title>
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe6f0 0%, #ffcce0 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== ШАПКА ===== */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: white;
            border-radius: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
        }

        .header h1 {
            font-size: 48px;
            color: #ff69b4;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 18px;
        }

        /* ===== КАТЕГОРИИ ===== */
        .categories {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cat-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            color: #ff69b4;
            border: 2px solid #ff69b4;
        }

        .cat-btn.active {
            background: #ff69b4;
            color: white;
        }

        .cat-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
        }

        /* ===== КАРТОЧКИ ТОВАРОВ ===== */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            border-color: #ff69b4;
        }

        .product-emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .product-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .product-desc {
            font-size: 13px;
            color: #999;
            margin-bottom: 12px;
        }

        .product-price {
            font-size: 24px;
            font-weight: bold;
            color: #ff69b4;
            margin-bottom: 15px;
        }

        .select-btn {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s;
        }

        .select-btn:hover {
            background: #ff3388;
            transform: scale(1.02);
        }

        /* ===== КОРЗИНА ===== */
        .cart-section {
            background: white;
            border-radius: 30px;
            padding: 25px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .cart-title {
            font-size: 24px;
            color: #ff69b4;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .cart-items {
            max-height: 400px;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #ffe0ec;
            flex-wrap: wrap;
            gap: 10px;
        }

        .cart-item-info {
            flex: 2;
        }

        .cart-item-name {
            font-weight: bold;
            color: #333;
        }

        .cart-item-details {
            font-size: 12px;
            color: #999;
        }

        .cart-item-price {
            font-weight: bold;
            color: #ff69b4;
            min-width: 80px;
        }

        .cart-item-remove {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .cart-total {
            text-align: right;
            padding-top: 20px;
            margin-top: 20px;
            border-top: 2px solid #ffe0ec;
            font-size: 20px;
            font-weight: bold;
        }

        .cart-total span {
            color: #ff69b4;
            font-size: 28px;
        }

        .order-btn {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: all 0.3s;
        }

        .order-btn:hover {
            background: #ff3388;
            transform: scale(1.02);
        }

        .empty-cart {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* ===== МОДАЛЬНОЕ ОКНО ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            color: #ff69b4;
            margin-bottom: 20px;
        }

        .modal-content label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
            color: #333;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ffe0ec;
            border-radius: 15px;
            font-family: inherit;
        }

        .modal-content textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-submit {
            background: #ff69b4;
            color: white;
        }

        .modal-cancel {
            background: #ddd;
            color: #333;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }
            .products {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== ШАПКА ===== -->
        <div class="header">
            <h1>🌸 Pink Paradise 🌸</h1>
            <p>Фото · Видео · Костюмы · На заказ</p>
        </div>

        <!-- ===== КАТЕГОРИИ ===== -->
        <div class="categories">
            <button class="cat-btn active" data-cat="all">Все</button>
            <button class="cat-btn" data-cat="photo">📸 Фото</button>
            <button class="cat-btn" data-cat="video">🎥 Видео</button>
            <button class="cat-btn" data-cat="costume">👗 Костюмы</button>
            <button class="cat-btn" data-cat="custom">✨ На заказ</button>
        </div>

        <!-- ===== ТОВАРЫ ===== -->
        <div class="products" id="products"></div>

        <!-- ===== КОРЗИНА ===== -->
        <div class="cart-section">
            <div class="cart-title">
                <span>🛒 Корзина</span>
                <button class="select-btn" id="clear-cart" style="width: auto; padding: 8px 20px;">Очистить</button>
            </div>
            <div id="cart-items"></div>
            <div class="cart-total" id="cart-total">Итого: <span>0</span> ₽</div>
            <button class="order-btn" id="order-btn">📝 Оформить заказ</button>
        </div>

    </div>

    <!-- ===== МОДАЛЬНОЕ ОКНО ===== -->
    <div class="modal" id="order-modal">
        <div class="modal-content">
            <h3>🌸 Оформление заказа</h3>

            <label>Ваше имя в Discord</label>
            <input type="text" id="username" placeholder="@username или ID" />

            <label>Выбранный товар</label>
            <input type="text" id="selected-product" readonly />

            <label>Количество/Подробности</label>
            <textarea id="order-details" placeholder="Напишите, что именно хотите заказать..."></textarea>

            <label>Контакт для связи</label>
            <input type="text" id="contact" placeholder="Discord, Telegram или другой способ связи" />

            <div class="modal-buttons">
                <button class="modal-submit" id="submit-order">✅ Отправить</button>
                <button class="modal-cancel" id="cancel-order">❌ Отмена</button>
            </div>
        </div>
    </div>

    <!-- ===== СКРИПТ ===== -->
    <script>
        // ===== ТОВАРЫ =====
        const products = [
            // Фото
            { id: 1, name: "📸 Одно любое фото", price: 50, desc: "1 фото на ваш выбор", category: "photo" },
            { id: 2, name: "📸 5 любых фото", price: 200, desc: "5 фото (выгодно!)", category: "photo" },
            { id: 3, name: "📸 10 любых фото", price: 425, desc: "10 фото", category: "photo" },
            { id: 4, name: "📸 15 любых фото", price: 600, desc: "15 фото (максимум!)", category: "photo" },
            { id: 5, name: "📸 Все фото (без костюмов)", price: 1500, desc: "Абсолютно все фото", category: "photo" },
            // Видео
            { id: 6, name: "🎥 Одно любое видео", price: 200, desc: "1 видео без ограничений", category: "video" },
            { id: 7, name: "🎥 3 любых видео", price: 500, desc: "3 видео", category: "video" },
            { id: 8, name: "🎥 5 любых видео", price: 850, desc: "5 видео", category: "video" },
            { id: 9, name: "🎥 10 любых видео", price: 1800, desc: "10 видео", category: "video" },
            // Костюмы
            { id: 10, name: "👗 Ушки/лапки", price: 25, desc: "Оленьи, заячьи, котика", category: "costume", isAddon: true,
                forType: "photo" },
            { id: 11, name: "👗 Средний костюм", price: 75, desc: "Школьница, латекс, с мечом", category: "costume",
                isAddon: true, forType: "photo" },
            { id: 12, name: "👗 Качественный костюм", price: 200, desc: "Суккуб, кролик, монашка", category: "costume",
                isAddon: true, forType: "photo" },
            { id: 13, name: "👗 Полностью голая", price: 50, desc: "Добавка к фото", category: "costume", isAddon: true,
                forType: "photo" },
            // На заказ
            { id: 14, name: "✨ Видео на заказ", price: 1250, desc: "Скажу/сделаю что захочешь", category: "custom" },
            { id: 15, name: "✨ Общение с вебкой", price: 1500, desc: "Покажу на вебке что захочешь", category: "custom" },
            { id: 16, name: "✨ Флирт/общение 1 день", price: 750, desc: "С войсом ×2", category: "custom" },
            { id: 17, name: "✨ Игры вместе 1 час", price: 500, desc: "Если игра платная — покупаешь", category: "custom" },
            { id: 18, name: "✨ Встреча в жизни 1 час", price: 4000, desc: "Реальная встреча", category: "custom" },
            { id: 19, name: "✨ Общение ВЕЧНО", price: 5000, desc: "Всё включено навсегда", category: "custom" }
        ];

        // ===== КОРЗИНА =====
        let cart = [];

        // ===== DOM =====
        const productsContainer = document.getElementById('products');
        const cartItemsContainer = document.getElementById('cart-items');
        const cartTotalSpan = document.querySelector('#cart-total span');
        const clearCartBtn = document.getElementById('clear-cart');
        const orderBtn = document.getElementById('order-btn');
        const modal = document.getElementById('order-modal');
        const modalProduct = document.getElementById('selected-product');
        const submitOrderBtn = document.getElementById('submit-order');
        const cancelOrderBtn = document.getElementById('cancel-order');

        // ===== ОТОБРАЗИТЬ ТОВАРЫ =====
        function renderProducts(category = 'all') {
            const filtered = products.filter(p => category === 'all' || p.category === category);
            productsContainer.innerHTML = filtered.map(product => `
                    <div class="product-card" data-id="${product.id}">
                        <div class="product-emoji">${product.name.split(' ')[0]}</div>
                        <div class="product-title">${product.name}</div>
                        <div class="product-desc">${product.desc}</div>
                        <div class="product-price">${product.price} ₽</div>
                        <button class="select-btn" onclick="addToCart(${product.id})">➕ Добавить</button>
                    </div>
                `).join('');
        }

        // ===== ДОБАВИТЬ В КОРЗИНУ =====
        window.addToCart = function(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            if (product.isAddon) {
                const hasPhoto = cart.some(item => item.category === 'photo' && !item.isAddon);
                if (!hasPhoto) {
                    alert('❌ Сначала добавьте фото! Костюмы идут как дополнение к фото.');
                    return;
                }
            }
            cart.push({ ...product, quantity: 1 });
            renderCart();
        };

        // ===== ОТОБРАЗИТЬ КОРЗИНУ =====
        function renderCart() {
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<div class="empty-cart">🛒 Корзина пуста. Добавьте товары!</div>';
                cartTotalSpan.textContent = '0';
                return;
            }
            const grouped = {};
            cart.forEach(item => {
                const key = item.id;
                if (grouped[key]) {
                    grouped[key].quantity++;
                } else {
                    grouped[key] = { ...item, quantity: 1 };
                }
            });
            const itemsArray = Object.values(grouped);
            const total = itemsArray.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartItemsContainer.innerHTML = itemsArray.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-details">${item.desc}</div>
                        </div>
                        <div class="cart-item-price">${item.price} ₽ × ${item.quantity}</div>
                        <button class="cart-item-remove" onclick="removeFromCart(${item.id})">❌ Удалить</button>
                    </div>
                `).join('');
            cartTotalSpan.textContent = total;
        }

        // ===== УДАЛИТЬ ИЗ КОРЗИНЫ =====
        window.removeFromCart = function(productId) {
            const index = cart.findIndex(item => item.id === productId);
            if (index !== -1) {
                cart.splice(index, 1);
                renderCart();
            }
        };

        // ===== ОЧИСТИТЬ КОРЗИНУ =====
        clearCartBtn.addEventListener('click', () => {
            if (confirm('Очистить всю корзину?')) {
                cart = [];
                renderCart();
            }
        });

        // ===== ОТКРЫТЬ МОДАЛКУ =====
        orderBtn.addEventListener('click', () => {
            if (cart.length === 0) {
                alert('❌ Корзина пуста! Добавьте товары.');
                return;
            }
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            modalProduct.value = cart.map(item => `${item.name} (${item.price}₽)`).join(', ');
            modal.style.display = 'flex';
        });

        // ===== ЗАКРЫТЬ МОДАЛКУ =====
        cancelOrderBtn.addEventListener('click', () => {
            modal.style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('order-details').value = '';
            document.getElementById('contact').value = '';
        });

        // ===== ОТПРАВИТЬ ЗАКАЗ =====
        submitOrderBtn.addEventListener('click', () => {
            const username = document.getElementById('username').value.trim();
            const details = document.getElementById('order-details').value.trim();
            const contact = document.getElementById('contact').value.trim();
            if (!username) {
                alert('❌ Укажите ваше имя в Discord!');
                return;
            }
            if (!details) {
                alert('❌ Напишите подробности заказа!');
                return;
            }
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            const orderText =
                `🌸 НОВЫЙ ЗАКАЗ 🌸\n\n👤 Заказчик: ${username}\n📞 Контакты: ${contact || 'Не указаны'}\n\n🛒 Товары:\n${cart.map(item => `• ${item.name} — ${item.price}₽`).join('\n')}\n\n💰 Итого: ${total} ₽\n\n📝 Пожелания:\n${details}`;
            localStorage.setItem('lastOrder', orderText);
            alert(`✅ Заказ оформлен!\n\nИтого: ${total} ₽\n\nСкопируйте текст заказа и отправьте администратору:\n\n${orderText}`);
            const copyWindow = window.open();
            copyWindow.document.write(
                `<pre style="font-family: monospace; white-space: pre-wrap; padding: 20px;">${orderText}</pre>`
                );
            copyWindow.document.write(
                '<button onclick="navigator.clipboard.writeText(document.querySelector(\'pre\').innerText)">📋 Копировать</button>'
                );
            cart = [];
            renderCart();
            modal.style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('order-details').value = '';
            document.getElementById('contact').value = '';
        });

        // ===== ФИЛЬТРАЦИЯ ПО КАТЕГОРИЯМ =====
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderProducts(btn.dataset.cat);
            });
        });

        // ===== СТАРТ =====
        renderProducts();
    </script>

</body>
</html>
